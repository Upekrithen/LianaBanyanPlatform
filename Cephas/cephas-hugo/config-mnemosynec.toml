baseURL = "https://mnemosynec.ai/"
languageCode = "en-us"
title = "MnemosyneC — Just Add Salt · How to Get the Right Answer"
theme = "PaperMod"
publishDir = "public-mnemosynec"
contentDir = "content-mnemosynec"
refLinksErrorLevel = "warning"
enableRobotsTXT = true
buildFuture = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[pagination]
  pagerSize = 10

[params]
  hideFooter = true
  description = "Just Add Salt. How to Get the Right Answer. The cooperative-class architecture for local-first AI that works at 97.1% on MMLU-Pro · on consumer hardware · no paid API keys · empirically reproducible. Workers keep 83.3%. No ads. No VC."
  author = "Liana Banyan Corporation"
  defaultTheme = "dark"
  env = "production"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  UseHugoToc = false

  # BP081: conditional for mnemosynec homepage partial
  isMnemosynec = true

  # BP084: Stripe publishable key for embedded Checkout on gate pages
  # FOUNDER: replace with your live pk from https://dashboard.stripe.com/apikeys
  stripePk = "pk_live_FOUNDER_SET_IN_CONFIG"

  # BP084: Supabase edge functions base URL (public, safe to embed)
  supabaseFunctionsUrl = "https://ruuxzilgmuwddcofqecc.supabase.co/functions/v1"

  [params.label]
    text = "MnemosyneC"
    icon = "/LianaBanyanLogo.png"
    iconHeight = 50

