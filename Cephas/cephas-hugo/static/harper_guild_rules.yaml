# Liana Banyan Corporation — Harper Guild (Initiative #12; Brené Brown Harper Prime)
# Doctrine: feedback_blood_rule_no_law_enforcement_direct_access_harper_guild_mediation.md
# BP041 — Founder direct: "Yes, some things are private. So, we have rules — the Harper Guild decides."
#
# AGPL-licensed: this rule-base is forkable under cooperative-class jurisprudence.
# Higher Standards Class: Harper Guild itself bound by these rules + audit trail + periodic review.
