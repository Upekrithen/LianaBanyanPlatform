    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

  [params.label]
    text = "Liana Banyan"
    icon = "/LianaBanyanLogo.png"
    iconHeight = 50

