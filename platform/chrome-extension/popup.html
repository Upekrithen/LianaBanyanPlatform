<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mnemosyne Memory</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 200px;
      max-height: 600px;
      background: #0a0f1a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      border-bottom: 1px solid rgba(110,231,183,0.15);
      background: rgba(10,15,26,0.98);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-name {
      font-size: 14px;
      font-weight: 700;
      color: #6ee7b7;
      letter-spacing: -0.3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #334155;
      transition: background 0.3s;
    }

    .status-dot.online { background: #22c55e; }
    .status-dot.offline { background: #ef4444; }

    .status-text {
      font-size: 10px;
      color: #64748b;
    }

    .settings-btn {
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      padding: 2px;
      font-size: 13px;
      line-height: 1;
      transition: color 0.15s;
    }

    .settings-btn:hover { color: #94a3b8; }

    .body {
      padding: 12px 16px;
      overflow-y: auto;
      max-height: 510px;
    }

    .query-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .query-input {
      flex: 1;
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(100,116,139,0.3);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
      resize: none;
      min-height: 36px;
      max-height: 80px;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .query-input:focus {
      border-color: rgba(110,231,183,0.4);
    }

    .query-input::placeholder { color: #475569; }

    .ask-btn {
      background: rgba(110,231,183,0.12);
      border: 1px solid rgba(110,231,183,0.3);
      border-radius: 8px;
      color: #6ee7b7;
      font-size: 11px;
      font-weight: 600;
      padding: 8px 12px;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
      transition: background 0.15s;
    }

    .ask-btn:hover { background: rgba(110,231,183,0.2); }
    .ask-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
    }

    .chip {
      background: rgba(100,116,139,0.1);
      border: 1px solid rgba(100,116,139,0.2);
      border-radius: 10px;
      color: #94a3b8;
      font-size: 10px;
      padding: 3px 8px;
      cursor: pointer;
      transition: all 0.12s;
    }

    .chip:hover {
      background: rgba(110,231,183,0.08);
      border-color: rgba(110,231,183,0.25);
      color: #6ee7b7;
    }

    .result-box {
      background: rgba(15,23,42,0.6);
      border: 1px solid rgba(100,116,139,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 12px;
      line-height: 1.6;
      color: #cbd5e1;
      min-height: 40px;
      position: relative;
    }

    .result-box.loading {
      color: #475569;
      font-style: italic;
    }

    .result-box.error {
      border-color: rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    .result-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #475569;
      margin-bottom: 6px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }

    .routing-badge {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 8px;
      font-weight: 600;
    }

    .routing-substrate {
      background: rgba(110,231,183,0.1);
      color: #6ee7b7;
      border: 1px solid rgba(110,231,183,0.2);
    }

    .routing-cloud {
      background: rgba(59,130,246,0.1);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.2);
    }

    .routing-miss {
      background: rgba(100,116,139,0.1);
      color: #94a3b8;
      border: 1px solid rgba(100,116,139,0.2);
    }

    .latency {
      font-size: 9px;
      color: #475569;
    }

    /* Copy for Copilot button - scope 14 */
    .copilot-row {
      margin-bottom: 10px;
    }

    .copilot-btn {
      width: 100%;
      background: rgba(168,85,247,0.08);
      border: 1px solid rgba(168,85,247,0.25);
      border-radius: 8px;
      color: #c084fc;
      font-size: 11px;
      font-weight: 600;
      padding: 8px 12px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .copilot-btn:hover { background: rgba(168,85,247,0.14); }
    .copilot-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .copilot-icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    .copilot-text { flex: 1; }
    .copilot-sub {
      font-size: 9px;
      font-weight: 400;
      color: #a78bfa;
      opacity: 0.8;
      display: block;
      margin-top: 1px;
    }

    .copilot-btn.copied {
      background: rgba(34,197,94,0.08);
      border-color: rgba(34,197,94,0.25);
      color: #4ade80;
    }

    .note-row {
      margin-bottom: 8px;
    }

    .note-input {
      width: 100%;
      background: rgba(15,23,42,0.6);
      border: 1px solid rgba(100,116,139,0.2);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 11px;
      padding: 7px 10px;
      outline: none;
      font-family: inherit;
    }

    .note-input:focus { border-color: rgba(110,231,183,0.3); }
    .note-input::placeholder { color: #475569; }

    .save-note-btn {
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 6px;
      color: #60a5fa;
      font-size: 10px;
      font-weight: 600;
      padding: 4px 10px;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }

    .save-note-btn:hover { background: rgba(59,130,246,0.18); }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #475569;
      margin-bottom: 6px;
    }

    .offline-msg {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      color: #fca5a5;
      line-height: 1.5;
    }

    .offline-msg strong { color: #f87171; }

    .offline-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .open-app-btn {
      flex: 1;
      background: rgba(110,231,183,0.1);
      border: 1px solid rgba(110,231,183,0.25);
      border-radius: 8px;
      color: #6ee7b7;
      font-size: 11px;
      font-weight: 600;
      padding: 8px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }

    .open-app-btn:hover { background: rgba(110,231,183,0.18); }

    .open-options-btn {
      background: rgba(100,116,139,0.1);
      border: 1px solid rgba(100,116,139,0.2);
      border-radius: 8px;
      color: #94a3b8;
      font-size: 11px;
      font-weight: 600;
      padding: 8px 12px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }

    .open-options-btn:hover { background: rgba(100,116,139,0.18); }

    .divider {
      border: none;
      border-top: 1px solid rgba(100,116,139,0.12);
      margin: 10px 0;
    }

    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid rgba(110,231,183,0.2);
      border-top-color: #6ee7b7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .page-context {
      font-size: 10px;
      color: #475569;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Scope 17: version footer */
    .popup-footer {
      padding: 6px 16px 8px;
      border-top: 1px solid rgba(100,116,139,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .version-tag {
      font-size: 9px;
      color: #1e293b;
    }

    .shortcut-hint {
      font-size: 9px;
      color: #1e293b;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <div class="status-dot" id="statusDot"></div>
      <span class="brand-name">Mnemosyne</span>
    </div>
    <div class="header-right">
      <span class="status-text" id="statusText">Checking...</span>
      <button class="settings-btn" id="settingsBtn" title="Extension options">&#9881;</button>
    </div>
  </div>

  <div class="body">
    <!-- Offline view: scope 9 -->
    <div id="offlineView" style="display:none">
      <div class="offline-msg">
        <strong>Mnemosyne bridge is not running.</strong><br />
        Start the Mnemosyne app or bridge server on your computer
        (<code>npm start</code> in the bridge folder, default port 11480).
      </div>
      <div class="offline-actions">
        <button class="open-app-btn" id="retryBtn">Retry Connection</button>
        <button class="open-options-btn" id="offlineOptionsBtn">Settings</button>
      </div>
    </div>

    <div id="onlineView" style="display:none">
      <div class="page-context" id="pageContext"></div>

      <!-- Scope 14/15: Copy context for Copilot -->
      <div class="copilot-row">
        <button class="copilot-btn" id="copilotBtn" title="Ctrl+Shift+C">
          <span class="copilot-icon">&#10697;</span>
          <span class="copilot-text">
            Copy context for Copilot
            <span class="copilot-sub">Formats memory as a prompt prefix - paste into Copilot</span>
          </span>
        </button>
      </div>

      <div class="section-title">Ask your memory</div>
      <div class="query-row">
        <textarea
          class="query-input"
          id="queryInput"
          placeholder="What do I know about this topic?"
          rows="2"
        ></textarea>
        <button class="ask-btn" id="askBtn">Ask</button>
      </div>

      <div class="chips" id="quickChips"></div>

      <div id="resultArea" style="display:none">
        <div class="result-label">Result</div>
        <div class="result-box" id="resultBox"></div>
        <div class="meta-row" id="metaRow" style="display:none">
          <span class="routing-badge" id="routingBadge"></span>
          <span class="latency" id="latencyText"></span>
        </div>
      </div>

      <hr class="divider" />

      <div class="section-title">Save a note</div>
      <div class="note-row">
        <input
          class="note-input"
          id="noteInput"
          type="text"
          placeholder="Quick note for Mnemosyne..."
        />
        <button class="save-note-btn" id="saveNoteBtn">Save to Mnemosyne</button>
      </div>
    </div>
  </div>

  <!-- Scope 17: version + shortcut hint -->
  <div class="popup-footer">
    <span class="version-tag" id="versionTag">v1.1.0</span>
    <span class="shortcut-hint">Ctrl+Shift+M to open</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
