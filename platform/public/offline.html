<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4F46E5" />
  <title>Liana Banyan — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; max-width: 36ch; margin: 0 auto 1.5rem; }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #4f46e5;
      color: #fff;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      min-height: 44px;
      touch-action: manipulation;
    }
    .btn:hover { background: #4338ca; }
  </style>
</head>
<body>
  <img src="/LianaBanyanLogo.png" alt="Liana Banyan" class="logo" />
  <h1>You're offline</h1>
  <p>Pages you've already visited are still available. Connect to the internet to see the latest.</p>
  <button class="btn" onclick="window.location.reload()">Try again</button>
</body>
</html>
