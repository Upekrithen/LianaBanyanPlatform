<!-- apiarist-with-hive.svg
     DEFERRED ASSET  KN-D1 placeholder (final asset: Founder/designer picks)
     Brand-canon: bee + hive primary motif; no human characters (feedback_no_human_characters.md)
     Colors: amber-honey gold-tone (#d97706 / #f59e0b), hexagonal-cell pattern (composes HexIsle)
     See: apiarist_librarian_hive_cross_lb_frame_collective_intelligence_canon_bp016.eblet.md
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" aria-label="Apiarist Librarian  The Hive (placeholder)">
  <!-- Honeycomb cells (hexagonal  composes with HexIsle brand canon) -->
  <g opacity="0.25" fill="#d97706" stroke="#b45309" stroke-width="0.5">
    <polygon points="50,8 61,14 61,26 50,32 39,26 39,14"/>
    <polygon points="27,20 38,26 38,38 27,44 16,38 16,26"/>
    <polygon points="73,20 84,26 84,38 73,44 62,38 62,26"/>
    <polygon points="50,44 61,50 61,62 50,68 39,62 39,50"/>
    <polygon points="27,56 38,62 38,74 27,80 16,74 16,62"/>
    <polygon points="73,56 84,62 84,74 73,80 62,74 62,62"/>
  </g>
  <!-- Bee body (amber-honey) -->
  <ellipse cx="50" cy="52" rx="12" ry="8" fill="#f59e0b" stroke="#92400e" stroke-width="1"/>
  <!-- Bee stripes -->
  <rect x="40" y="50" width="20" height="2.5" fill="#1c1917" opacity="0.55" rx="1"/>
  <rect x="40" y="55" width="20" height="2.5" fill="#1c1917" opacity="0.55" rx="1"/>
  <!-- Bee wings (translucent) -->
  <ellipse cx="38" cy="44" rx="9" ry="5" fill="#fef9c3" stroke="#d97706" stroke-width="0.8" opacity="0.7" transform="rotate(-20 38 44)"/>
  <ellipse cx="62" cy="44" rx="9" ry="5" fill="#fef9c3" stroke="#d97706" stroke-width="0.8" opacity="0.7" transform="rotate(20 62 44)"/>
  <!-- Bee head -->
  <circle cx="50" cy="42" r="6" fill="#f59e0b" stroke="#92400e" stroke-width="1"/>
  <!-- Antennae -->
  <line x1="47" y1="37" x2="42" y2="30" stroke="#92400e" stroke-width="1" stroke-linecap="round"/>
  <line x1="53" y1="37" x2="58" y2="30" stroke="#92400e" stroke-width="1" stroke-linecap="round"/>
  <circle cx="42" cy="29" r="1.5" fill="#d97706"/>
  <circle cx="58" cy="29" r="1.5" fill="#d97706"/>
  <!-- Stinger -->
  <polygon points="50,60 47,65 53,65" fill="#92400e"/>
  <!-- Label -->
  <text x="50" y="88" text-anchor="middle" font-family="system-ui,sans-serif" font-size="5.5" fill="#92400e" font-weight="600" letter-spacing="0.5">APIARIST</text>
  <text x="50" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="4.5" fill="#b45309" opacity="0.7">THE HIVE</text>
</svg>
