name: Build Cephas (no deploy)

on:
  push:
    branches: [main]
    paths:
      - "Cephas/cephas-hugo/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Cephas/cephas-hugo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.152.2"
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Cephas
        run: hugo --gc --minify

      - name: Deploy reminder
        run: |
          echo "Deployment is manual by design."
          echo "Use deploy-staging.ps1 (type STAGING) or deploy-production.ps1 (type DEPLOY)."
