name: AMPLIFY Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build"
        required: true
        default: "v0.1.1"
      publish:
        description: "Publish artifacts to the GitHub Release"
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            build_args: --win --x64
            allow_failure: false
          - platform: mac
            os: macos-latest
            build_args: --mac --x64 --arm64
            allow_failure: true
          - platform: linux
            os: ubuntu-latest
            build_args: --linux --x64
            allow_failure: false

    continue-on-error: ${{ matrix.allow_failure }}

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript main
        run: npm exec tsc -- --noEmit -p tsconfig.main.json

      - name: TypeScript renderer
        run: npm exec tsc -- --noEmit -p tsconfig.renderer.json

      - name: Build application
        run: npm run build

      - name: Package artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm exec electron-builder -- ${{ matrix.build_args }} --publish never

      - name: Upload Windows release artifacts
        if: ${{ matrix.platform == 'windows' && (github.event_name == 'push' || inputs.publish == 'true') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: AMPLIFY Computer ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          fail_on_unmatched_files: true

      - name: Upload Linux release artifacts
        if: ${{ matrix.platform == 'linux' && (github.event_name == 'push' || inputs.publish == 'true') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: AMPLIFY Computer ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/latest-linux*.yml
          fail_on_unmatched_files: true
