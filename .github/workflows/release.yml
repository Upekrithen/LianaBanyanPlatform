name: AMPLIFY Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            build_args: --win --x64
          - platform: mac
            os: macos-latest
            build_args: --mac --x64 --arm64
          - platform: linux
            os: ubuntu-latest
            build_args: --linux --x64

    defaults:
      run:
        working-directory: amplify-computer

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: amplify-computer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript main
        run: npm exec tsc -- --noEmit -p tsconfig.main.json

      - name: TypeScript renderer
        run: npm exec tsc -- --noEmit -p tsconfig.renderer.json

      - name: Build application
        run: npm run build

      - name: Package artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm exec electron-builder -- ${{ matrix.build_args }} --publish never

      - name: Upload GitHub release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: AMPLIFY Computer ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: amplify-computer/release/**
          fail_on_unmatched_files: true
