# K506 Phase E — Substrate Savings Calibration Auto-Pipeline
# Runs every 30 days to compute empirical cold multipliers from accumulated data.
# Also runs on manual dispatch (workflow_dispatch) for ad-hoc calibration.
#
# Honest scoping: until paired control data is available (R14/R15 runs or
# Test Frame cold-vs-hot pairs), the "empirical" multipliers remain tautological.
# The runner flags this clearly in every calibration record. We ship the
# infrastructure; we don't manufacture false precision.

name: Substrate Savings Calibration

on:
  schedule:
    # 30-day cycle: 1st of each month at 06:00 UTC
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      window_days:
        description: "Days of data to include (0 = all-time)"
        required: false
        default: "90"
      min_sessions:
        description: "Minimum sessions per agent for calibration"
        required: false
        default: "5"

jobs:
  calibrate:
    name: Run Calibration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so calibration can read git metadata

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run calibration (dry-run first)
        id: dry_run
        run: |
          python librarian-mcp/scripts/calibration_runner.py \
            --window-days ${{ inputs.window_days || '90' }} \
            --min-sessions ${{ inputs.min_sessions || '5' }} \
            --verbose

      - name: Run calibration (write results)
        run: |
          python librarian-mcp/scripts/calibration_runner.py \
            --write \
            --window-days ${{ inputs.window_days || '90' }} \
            --min-sessions ${{ inputs.min_sessions || '5' }}

      - name: Commit calibration results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if calibration log changed
          if git diff --quiet librarian-mcp/stitchpunks/data/substrate_savings_calibration_log.jsonl 2>/dev/null; then
            echo "No calibration changes to commit."
          else
            git add librarian-mcp/stitchpunks/data/substrate_savings_calibration_log.jsonl
            RUN_DATE=$(date +%Y-%m-%d)
            WINDOW="${{ inputs.window_days || '90' }}"
            git commit -m "chore(calibration): K506 monthly savings calibration run ${RUN_DATE} — window=${WINDOW}d. Auto-generated by K506 Phase E calibration pipeline."
            git push
          fi
