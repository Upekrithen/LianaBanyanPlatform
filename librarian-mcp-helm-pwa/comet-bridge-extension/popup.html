<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comet Bridge</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <span class="logo">⛩</span>
    <div class="title-block">
      <span class="title">Comet Bridge</span>
      <span class="subtitle">Cathedral Injection</span>
    </div>
  </div>

  <div class="status-row">
    <span class="status-label">Helm Daemon</span>
    <span id="daemon-status" class="status-badge status-checking">checking…</span>
  </div>

  <div class="divider"></div>

  <div class="toggle-row">
    <div class="toggle-info">
      <span class="toggle-label">Cathedral Injection</span>
      <span class="toggle-hint">Enriches queries with LB context</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="injection-toggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div class="divider"></div>

  <div class="info-row" id="intent-info" style="display:none;">
    <span class="info-label">Last intent:</span>
    <span id="last-intent" class="info-value">—</span>
  </div>

  <div class="footer">
    <span class="footer-text">K485A · <a id="helm-link" href="#" target="_blank">Open Helm</a></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
