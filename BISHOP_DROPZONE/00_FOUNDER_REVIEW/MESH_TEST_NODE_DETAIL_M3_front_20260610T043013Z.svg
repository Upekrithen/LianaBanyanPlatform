<svg xmlns="http://www.w3.org/2000/svg" width="280" height="220" viewBox="0 0 280 220" role="img" aria-label="M3 node accuracy detail">
  <rect width="280" height="220" fill="#1a1a2e" rx="10"/>
  <rect x="1" y="1" width="278" height="218" fill="none" stroke="#334155" stroke-width="1" rx="9"/>

  <!-- Node label -->
  <text x="140" y="26" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#f1f5f9">M3</text>
  <text x="140" y="42" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">COLD vs HOT Accuracy</text>

  <!-- COLD bar -->
  <rect x="60" y="173.0" width="50" height="2.0" fill="#64748b" rx="3"/>
  <text x="85" y="167.0" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">0.0%</text>
  <text x="85" y="192" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">COLD</text>

  <!-- HOT bar -->
  <rect x="170" y="173.0" width="50" height="2.0" fill="#3b82f6" rx="3"/>
  <text x="195" y="167.0" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f1f5f9">0.0%</text>
  <text x="195" y="192" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#f1f5f9">HOT</text>

  <!-- Baseline -->
  <line x1="30" y1="175" x2="250" y2="175" stroke="#334155" stroke-width="1"/>

  <!-- Delta annotation -->
  <text x="140" y="210" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#22c55e">lift: +0.0pp</text>
</svg>