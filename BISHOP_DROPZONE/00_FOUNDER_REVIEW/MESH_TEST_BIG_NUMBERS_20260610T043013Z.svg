<svg xmlns="http://www.w3.org/2000/svg" width="480" height="200" viewBox="0 0 480 200" role="img" aria-label="MnemosyneC Mesh Test Results">
  <rect width="480" height="200" fill="#1a1a2e" rx="12"/>
  <rect x="1" y="1" width="478" height="198" fill="none" stroke="#334155" stroke-width="1" rx="11"/>

  <!-- FAST column (left) -->
  <rect x="12" y="12" width="142" height="176" fill="#16213e" rx="8"/>
  <text x="83" y="42" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#3b82f6" letter-spacing="2">FAST</text>
  <text x="83" y="90" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="700" fill="#f1f5f9">TBD</text>
  <text x="83" y="116" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">p50 HOT latency</text>
  <line x1="32" y1="130" x2="134" y2="130" stroke="#334155" stroke-width="1"/>
  <text x="83" y="152" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#94a3b8">local inference</text>
  <text x="83" y="168" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#94a3b8">no round-trip</text>

  <!-- CHEAP column (center) -->
  <rect x="169" y="12" width="142" height="176" fill="#16213e" rx="8"/>
  <text x="240" y="42" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#eab308" letter-spacing="2">CHEAP</text>
  <text x="240" y="90" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="700" fill="#f1f5f9">$0.00</text>
  <text x="240" y="116" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">zero API cost</text>
  <line x1="189" y1="130" x2="291" y2="130" stroke="#334155" stroke-width="1"/>
  <text x="240" y="152" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#94a3b8">local compute</text>
  <text x="240" y="168" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#94a3b8">no token spend</text>

  <!-- GOOD column (right) -->
  <rect x="326" y="12" width="142" height="176" fill="#16213e" rx="8"/>
  <text x="397" y="42" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#22c55e" letter-spacing="2">GOOD</text>
  <text x="397" y="90" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="700" fill="#f1f5f9">TBD</text>
  <text x="397" y="116" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">HOT vs COLD lift</text>
  <line x1="346" y1="130" x2="448" y2="130" stroke="#334155" stroke-width="1"/>
  <text x="397" y="152" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#94a3b8">MnemosyneC</text>
  <text x="397" y="168" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#94a3b8">accuracy boost</text>
</svg>