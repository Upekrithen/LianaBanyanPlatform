<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300" role="img" aria-label="HOT vs COLD accuracy by node">
  <rect width="600" height="300" fill="#1a1a2e" rx="10"/>
  <rect x="1" y="1" width="598" height="298" fill="none" stroke="#334155" stroke-width="1" rx="9"/>

  <!-- Title -->
  <text x="300" y="24" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="600" fill="#f1f5f9">HOT vs COLD Accuracy -- Three-Node Mesh</text>

  <!-- Y-axis ticks and gridlines -->
  <line x1="60" y1="230.0" x2="560" y2="230.0" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
<text x="54" y="234.0" text-anchor="end" font-family="ui-monospace,monospace" font-size="9" fill="#94a3b8">0%</text>


  <!-- Bars -->
  <rect x="83.8" y="230.0" width="35.0" height="2.0" fill="#64748b" rx="2"/>
<rect x="126.2" y="230.0" width="35.0" height="2.0" fill="#3b82f6" rx="2"/>
<rect x="208.8" y="230.0" width="35.0" height="2.0" fill="#64748b" rx="2"/>
<rect x="251.2" y="230.0" width="35.0" height="2.0" fill="#3b82f6" rx="2"/>
<rect x="333.8" y="230.0" width="35.0" height="2.0" fill="#64748b" rx="2"/>
<rect x="376.2" y="230.0" width="35.0" height="2.0" fill="#3b82f6" rx="2"/>
<rect x="458.8" y="230.0" width="35.0" height="2.0" fill="#64748b" rx="2" stroke="#f1f5f9" stroke-width="1.5"/>
<rect x="501.2" y="230.0" width="35.0" height="2.0" fill="#60a5fa" rx="2" stroke="#f1f5f9" stroke-width="1.5"/>


  <!-- Node labels -->
  <text x="122.5" y="248" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="400" fill="#94a3b8">M1</text>
<text x="247.5" y="248" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="400" fill="#94a3b8">M2</text>
<text x="372.5" y="248" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="400" fill="#94a3b8">M3</text>
<text x="497.5" y="248" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="700" fill="#94a3b8">Combined</text>


  <!-- Legend -->
  <rect x="380" y="270" width="12" height="12" fill="#64748b" rx="2"/>
  <text x="396" y="280" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">COLD (no MnemosyneC)</text>
  <rect x="490" y="270" width="12" height="12" fill="#3b82f6" rx="2"/>
  <text x="506" y="280" font-family="ui-monospace,monospace" font-size="10" fill="#f1f5f9">HOT</text>

  <!-- Axis line -->
  <line x1="60" y1="40" x2="60" y2="230" stroke="#334155" stroke-width="1.5"/>
  <line x1="60" y1="230" x2="560" y2="230" stroke="#334155" stroke-width="1.5"/>
</svg>