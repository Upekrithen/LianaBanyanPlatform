<svg xmlns="http://www.w3.org/2000/svg" width="280" height="220" viewBox="0 0 280 220" role="img" aria-label="M1 node shard detail">
  <rect width="280" height="220" fill="#1a1a2e" rx="10"/>
  <rect x="1" y="1" width="278" height="218" fill="none" stroke="#334155" stroke-width="1" rx="9"/>

  <!-- Node label -->
  <text x="140" y="26" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#f1f5f9">M1</text>
  <text x="140" y="42" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">Shard Details</text>

  <line x1="20" y1="52" x2="260" y2="52" stroke="#334155" stroke-width="1"/>

  <!-- Stats rows -->
  <text x="30" y="80" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">Shard size</text>
  <text x="250" y="80" text-anchor="end" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#f1f5f9">4,011 questions</text>

  <text x="30" y="108" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">HOT p50 latency</text>
  <text x="250" y="108" text-anchor="end" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#3b82f6">0ms</text>

  <text x="30" y="136" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">HOT p95 latency</text>
  <text x="250" y="136" text-anchor="end" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#3b82f6">0ms</text>

  <line x1="20" y1="150" x2="260" y2="150" stroke="#334155" stroke-width="1"/>

  <text x="30" y="175" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">SHA-256 verify</text>
  <text x="250" y="175" text-anchor="end" font-family="ui-monospace,monospace" font-size="11" font-weight="700" fill="#22c55e">VERIFIED</text>

  <!-- Hash-verify badge -->
  <rect x="80" y="190" width="120" height="22" fill="#22c55e" rx="4" opacity="0.15"/>
  <text x="140" y="205" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" font-weight="600" fill="#22c55e">shard integrity VERIFIED</text>
</svg>