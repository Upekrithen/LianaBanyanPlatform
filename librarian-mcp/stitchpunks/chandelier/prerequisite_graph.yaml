---
# Chandelier Prerequisite Graph — KN009 / A&A #2291 Bedrock Foundation
#
# Encodes the scaffolding dependency order per Founder articulation (BP002 turn 13):
#   "scaffold → framing → wiring → building → edifices → paint"
#
# Structure is independent of invention-order. Captures STRUCTURAL dependency.
#
# Each primitive node declares:
#   layer              : scaffold | framing | wiring | building | edifice | paint
#   hard_prerequisites : primitives that MUST be present for this one to function
#   soft_enhancers     : primitives that ENHANCE this one when present
#   orthogonals        : primitives that are unaffected by presence/absence
#   aa_number          : A&A innovation number (optional)
#   landed_session     : Knight session that built this primitive (optional)
#   notes              : free-form notes
#
# This graph is the first-class data structure queried by:
#   query_prerequisites(primitive_id) → hard prerequisites
#   query_enhancers(primitive_id)     → soft enhancers
#   validate_substrate_subset(subset) → checks all hard prerequisites are met
#   recommend_minimum_subset(target)  → minimum prerequisite-set for a target primitive
#
# Source: project_chandelier_tower_of_peace_bedrock_canon.eblet.md (BP002 turn 13)
# Toolsmith log: TS-CHANDELIER-EMPIRICAL-MEASUREMENT-KN009-BP002

version: 1.0.0
opened: "2026-04-29"
opener: "Knight KN009/BP002"

