# Knight Cathedral Registry — K455c / B121
# ========================================
# Knight's Cathedral is a member-class Cathedral instantiated K461/B121.
# This registry enables cross-Cathedral consult_scribes(cathedral="knight")
# queries from Bishop's side, and will serve Knight's own context lookups.
#
# Tablet format: Knight schema (observation/category/timestamp/source_session/source_document/tokens)
# vs Bishop schema (ts/session/observation/source/canonical_ref).
# The consult layer normalizes both formats to a common view.
#
# NOTE: Knight's Cathedral intentionally contains NO R11 corpus.
# That is the control-arm invariant for K455c cross-Cathedral benchmark.

version: 0.1.0
opened: 2026-04-23
opener: K455c/B121 (cross-Cathedral consultation setup)
spec: ../SP22_SP23_THREE_FATES_AND_SCRIBES_CATHEDRAL_SPEC.md

scribes:
  - id: KnightQueue
    mode: observational
    primary:
      level: 1
      field: Knight session task queue — NEXT / QUEUED / LANDED state for Cursor Knight agent
      canonical_keepers:
        - BISHOP_DROPZONE/01_KnightPrompts/
        - KNIGHT_QUEUE.md
    adjacents:
      - level: 2
        field: session lifecycle (K-number progression, prerequisite gates)
      - level: 3
        field: BRIDLE discipline (task scope, prerequisites, tags)
    keywords:
      - NEXT
      - QUEUED
      - LANDED
      - Knight
      - K461
      - K455
      - K438
      - K442
      - K443
      - K441
      - session
      - task
      - queue
      - BISHOP_DROPZONE
      - prerequisite
      - gate
    activation_threshold: any K-number session reference or queue status lookup

  - id: KnightHandoffs
    mode: observational
    primary:
      level: 1
      field: Knight session handoff reports and landed commit provenance
      canonical_keepers:
        - BISHOP_DROPZONE/03_BishopHandoffs/REPORT_KNIGHT_*.md
    adjacents:
      - level: 2
        field: git commit hashes and tag names for Knight sessions
      - level: 3
        field: session outcomes and architectural decisions made by Knight
    keywords:
      - handoff
      - REPORT_KNIGHT
      - landed
      - commit
      - tag
      - v-
      - git
      - deploy
      - ship
      - delivered
      - complete
    activation_threshold: any "what did Knight ship" or "which sessions landed" query

  - id: KnightBRIDLEMemory
    mode: observational
    primary:
      level: 1
      field: Knight BRIDLE discipline log — which rules were invoked and how
      canonical_keepers:
        - AGENTS.md (BRIDLE section)
    adjacents:
      - level: 2
        field: verify-before-assert discipline (Rule 2)
      - level: 3
        field: scope escalation stops (Rule 4)
    keywords:
      - BRIDLE
      - Rule 1
      - Rule 2
      - Rule 3
      - Rule 4
      - Rule 5
      - Rule 6
      - Rule 7
      - Rule 8
      - Rule 9
      - Rule 10
      - verify before asserting
      - do the task
      - prereq gate
      - stop and flag
    activation_threshold: any BRIDLE rule invocation or discipline observation

  - id: KnightArchitecture
    mode: observational
    primary:
      level: 1
      field: Knight architectural decisions — code surfaces touched, design choices made
      canonical_keepers:
        - librarian-mcp/src/
        - platform/src/
    adjacents:
      - level: 2
        field: MCP tool surfaces (server.ts, registerTool pattern)
      - level: 3
        field: Scribes Cathedral architecture (consult_scribes, tablet format)
      - level: 4
        field: platform deployment (Firebase, Supabase, build gates)
    keywords:
      - architecture
      - design
      - implementation
      - server.ts
      - MCP
      - consult_scribes
      - tablet
      - Cathedral
      - scope
      - cross-Cathedral
      - Knight's Cathedral
      - Bishop's Cathedral
      - schema
      - JSONL
      - append-only
      - K455c
      - K461
    activation_threshold: any architectural decision or code surface query

  # ============================================================
  # K475 / B122 — R12 dual-universe corpus Scribes (Knight Cathedral)
  # Mirror of Bishop's R12Cranewell / R12Covenant entries.
  # Minimal keywords per empirical discipline — auto-extractor does the work.
  # ============================================================

  - id: KnightR12Cranewell
    mode: corpus
    corpus_label: r12_cranewell
    primary:
      level: 1
      field: R12-Cranewell corpus — synthetic-coined manuscript preservation conservancy benchmark (50 facts, 6 categories) [Knight Cathedral copy, K475]
      canonical_keepers:
        - librarian-mcp/r10_cross_vendor/r12_cranewell_corpus.md
        - librarian-mcp/r10_cross_vendor/R12_QUESTION_BANK_CRANEWELL_SEALED.json
    adjacents:
      - level: 2
        field: Saltram Registry statistics and manuscript preservation metrics
      - level: 3
        field: chartered-scribe economics and mentorship frameworks
    keywords:
      - Cranewell
      - R12-CRANEWELL
      - R12-Cranewell
    activation_threshold: any R12-Cranewell benchmark question or corpus fact reference

  - id: KnightR12Covenant
    mode: corpus
    corpus_label: r12_covenant
    primary:
      level: 1
      field: R12-Covenant corpus — Chronicles of Thomas Covenant benchmark fixture (50 facts, 6 categories) [Knight Cathedral copy, K475]
      canonical_keepers:
        - librarian-mcp/r10_cross_vendor/r12_covenant_corpus.md
        - librarian-mcp/r10_cross_vendor/R12_QUESTION_BANK_COVENANT_SEALED.json
    adjacents:
      - level: 2
        field: Donaldson canon — First, Second, and Last Chronicles lore and statistics
      - level: 3
        field: The Land geography, peoples, and governance
    keywords:
      - Covenant
      - R12-COVENANT
      - R12-Covenant
    activation_threshold: any R12-Covenant benchmark question or corpus fact reference

  # ============================================================
  # K480 / B122 — Toolsmith Scribe (command-lore substrate)
  # Shared JSONL file with Bishop Cathedral — single source of truth.
  # Observational mode: lessons appended as discovered, consulted before tool invocations.
  # ============================================================

  - id: Toolsmith
    mode: observational
    primary:
      level: 1
      field: tool-invocation lore (shell commands, git operations, cross-platform quirks, heredoc/escaping/piping patterns) — append once, consult forever
      canonical_keepers:
        - librarian-mcp/stitchpunks/scribes/scribe_Toolsmith.jsonl
    adjacents:
      - level: 2
        field: PowerShell 5.1 and pwsh command quirks
      - level: 2
        field: bash and POSIX shell patterns
      - level: 3
        field: git command idioms (commit messages, multiline, heredoc)
      - level: 3
        field: Windows path conventions and escaping
      - level: 4
        field: MCP tool invocation patterns
    keywords:
      - Toolsmith
      - command
      - shell
      - PowerShell
      - pwsh
      - bash
      - heredoc
      - git commit
      - "&&"
      - Windows path
      - stderr
      - "2>&1"
      - $?
      - NonInteractive
    activation_threshold: any shell command invocation, git operation, or tool-use decision

