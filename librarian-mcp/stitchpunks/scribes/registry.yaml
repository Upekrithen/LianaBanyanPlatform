# Scribes Registry — Cathedral of Domain-Indexed Working Memory
# ================================================================
# Each Scribe has ONE primary field (Level 1, PhD-deep) and up to 12 adjacents
# in levels of decreasing expertise. Scribes activate when the Three Fates
# (Clotho-Lachesis-Atropos) route session traffic to their domain.
#
# Levels:
#   1  = Primary (PhD-deep, canonical keeper)
#   2-3 = Secondary (PhD-adjacent, cross-validator)
#   4-6 = Tertiary (junior-adjacent, context-aware)
#   7-12 = Ancillary (loose cross-field awareness)
#
# Tablets are append-only JSONL at `librarian-mcp/stitchpunks/scribes/scribe_<id>.jsonl`.
# ================================================================

