<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MnemosyneC</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <span class="logo">🧠 MnemosyneC</span>
    <span class="version">v0.1.0</span>
  </div>
  <div class="status-row">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Checking connection...</span>
  </div>
  <div class="stats">
    <div class="stat-item">
      <span class="stat-value" id="eblet-count">—</span>
      <span class="stat-label">eblets captured today</span>
    </div>
  </div>
  <div class="footer">
    <span class="tagline">Your knowledge. Compounding.</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
