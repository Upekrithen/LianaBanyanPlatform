<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LB Test Frame</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #1e2333;
    }
    .logo { font-size: 20px; }
    .title { font-size: 15px; font-weight: 600; color: #f1f5f9; }
    .subtitle { font-size: 11px; color: #475569; }

    /* Persona indicator */
    .persona-bar {
      padding: 8px 16px;
      background: #0a0d13;
      border-bottom: 1px solid #1e2333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .persona-chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid;
    }
    .persona-chip.casual { border-color: #22c55e; color: #22c55e; }
    .persona-chip.developer { border-color: #60a5fa; color: #60a5fa; }
    .persona-chip.member { border-color: #fbbf24; color: #fbbf24; }
    .switch-persona { font-size: 11px; color: #475569; cursor: pointer; }
    .switch-persona:hover { color: #94a3b8; }

    /* Status row */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
    }
    .status-label { color: #64748b; }
    .status-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .status-alive { background: #0f2a1c; color: #4ade80; }
    .status-dead { background: #2a0f0f; color: #f87171; }
    .status-checking { background: #1a1a2e; color: #94a3b8; }

    .divider { height: 1px; background: #1e2333; margin: 0 16px; }

    /* Injection toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }
    .toggle-info { flex: 1; }
    .toggle-label { font-size: 13px; color: #e2e8f0; margin-bottom: 2px; }
    .toggle-hint { font-size: 11px; color: #475569; }
    .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background: #1e2333; border-radius: 22px; transition: 0.2s;
    }
    .slider:before {
      position: absolute; content: ''; height: 16px; width: 16px;
      left: 3px; bottom: 3px; background: #475569;
      border-radius: 50%; transition: 0.2s;
    }
    input:checked + .slider { background: #2563eb; }
    input:checked + .slider:before { transform: translateX(18px); background: white; }

    /* Selected AI display */
    .ai-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
    }
    .ai-label { color: #64748b; }
    .ai-value { color: #94a3b8; font-size: 12px; }

    /* Wing section */
    .wing-section {
      padding: 10px 16px;
      background: #0a0d13;
      border-bottom: 1px solid #1e2333;
    }
    .wing-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .wing-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #475569;
      font-weight: 600;
    }
    .wing-stats {
      display: flex;
      gap: 10px;
    }
    .wing-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .wing-stat-val {
      font-size: 14px;
      font-weight: 700;
      color: #f1f5f9;
    }
    .wing-stat-lbl {
      font-size: 10px;
      color: #475569;
    }
    .wing-link {
      font-size: 11px;
      color: #3b82f6;
      cursor: pointer;
      text-decoration: none;
    }
    .wing-link:hover { color: #60a5fa; }

    /* Action buttons */
    .actions {
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .btn {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      font-weight: 500;
    }
    .btn-verify {
      background: #1a2540;
      border: 1px solid #3b82f6;
      color: #60a5fa;
    }
    .btn-verify:hover { background: #1e2d52; }
    .btn-settings {
      background: transparent;
      border: 1px solid #1e2333;
      color: #64748b;
    }
    .btn-wing {
      background: #0f2a0f;
      border: 1px solid #22c55e;
      color: #4ade80;
    }
    .btn-wing:hover { background: #142a14; }

    /* Footer */
    .footer {
      padding: 8px 16px;
      border-top: 1px solid #1e2333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-text { font-size: 11px; color: #1e2333; }
    .footer-link { font-size: 11px; color: #334155; cursor: pointer; text-decoration: none; }
    .footer-link:hover { color: #475569; }

    .intent-row {
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .intent-label { font-size: 11px; color: #334155; }
    .intent-value { font-size: 11px; color: #475569; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⛩</div>
    <div>
      <div class="title">LB Test Frame</div>
      <div class="subtitle">Cathedral Injection</div>
    </div>
  </div>

  <div class="persona-bar">
    <span class="persona-chip" id="persona-chip">casual</span>
    <span class="switch-persona" onclick="openOptions()">Switch persona</span>
  </div>

  <div class="status-row">
    <span class="status-label">Helm Daemon</span>
    <span id="daemon-status" class="status-badge status-checking">checking…</span>
  </div>

  <div class="divider"></div>

  <div class="toggle-row">
    <div class="toggle-info">
      <div class="toggle-label">Cathedral Injection</div>
      <div class="toggle-hint">Enriches queries with LB context</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="injection-toggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div class="divider"></div>

  <div class="ai-row">
    <span class="ai-label">Active AI</span>
    <span class="ai-value" id="selected-ai">—</span>
  </div>

  <div class="intent-row" id="intent-row" style="display:none;">
    <span class="intent-label">Last intent:</span>
    <span class="intent-value" id="last-intent">—</span>
  </div>

  <div class="divider"></div>

  <!-- Wing section (K518) -->
  <div class="wing-section">
    <div class="wing-header">
      <span class="wing-title">⚖ Your Wing</span>
      <label class="switch" title="Enable/disable your Wing">
        <input type="checkbox" id="wing-toggle" checked />
        <span class="slider"></span>
      </label>
    </div>
    <div class="wing-stats">
      <div class="wing-stat">
        <span class="wing-stat-val" id="wing-rules-count">—</span>
        <span class="wing-stat-lbl">Augurs</span>
      </div>
      <div class="wing-stat">
        <span class="wing-stat-val" id="wing-fires-count">—</span>
        <span class="wing-stat-lbl">Fires</span>
      </div>
      <div style="flex:1;"></div>
      <a class="wing-link" onclick="openWingDashboard()">Dashboard →</a>
    </div>
  </div>

  <div class="divider"></div>

  <div class="actions">
    <div class="btn btn-verify" onclick="openVerify()">▶ Run Cathedral Verification Demo</div>
    <div class="btn btn-wing" onclick="openDisciplineRules()">⚖ Manage Wing Rules</div>
    <div class="btn btn-settings" onclick="openOnboarding()">⚙ Change AI / persona</div>
  </div>

  <div class="footer">
    <span class="footer-text">K518</span>
    <a class="footer-link" href="https://librarian.the2ndsecond.com/disciplines/your-wing" target="_blank">Wing guide →</a>
  </div>

  <script src="../popup.js"></script>
</body>
</html>
